      From 5e8b62bbdffe9a99d3772e7fa78f51e047ece96e Mon Sep 17 00:00:00 2001
      From: Paul Asjes <paul.asjes@elevenlabs.io>
      Date: Thu, 18 Jun 2026 11:07:18 +0200
      Subject: [PATCH] Restore optional values in DynamicVariablesConfig records
       (2.53.1) (#411)

      The 2.53.0 SDK regen bumped fern-typescript-sdk from 3.36.0 to 3.71.4,
      which dropped `| undefined` from `Record<string, T>` value types backed
      by OpenAPI `additionalProperties`. This broke callers that set individual
      dynamic variable entries to `undefined` (common in non-telephony flows
      where not every placeholder can be assigned).

      Restore the prior behavior on the four affected types and add them to
      .fernignore so the workaround survives regeneration. Revert once the
      upstream generator regression is fixed.
